<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente de IA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>IA DEVersidade</h1>
  </header>

  <main>
    <section id="secaochaveapi">
      <label for="chaveApi">Chave API:</label>
      <input type="password" id="chaveApi" placeholder="Cole aqui sua chave API">
    </section>

    <section id="secaochavepergunta">
      <label for="pergunta">Pergunta:</label>
      <textarea id="pergunta" placeholder="Digite sua pergunta..."></textarea>
      <button id="botaoPerguntar">Perguntar</button>
    </section>

    <section id="secao-resposta" style="display: none;">
      <h2>Resposta da IA:</h2>
      <div id="resposta"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
